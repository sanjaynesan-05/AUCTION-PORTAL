<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Auction - Multi-Device Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .status-box {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s;
        }
        .status-disconnected {
            background: #fee;
            color: #c33;
            border: 2px solid #fcc;
        }
        .status-connected {
            background: #efe;
            color: #393;
            border: 2px solid #cfc;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-connect {
            background: #667eea;
            color: white;
        }
        .btn-connect:hover { background: #5568d3; }
        .btn-disconnect {
            background: #f56565;
            color: white;
        }
        .btn-disconnect:hover { background: #e53e3e; }
        .btn-test {
            background: #48bb78;
            color: white;
        }
        .btn-test:hover { background: #38a169; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .auction-state {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .auction-state h3 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .state-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .state-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .state-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 4px;
        }
        .state-value {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }
        .state-value.highlight {
            color: #667eea;
        }
        .log-container {
            background: #2d3748;
            border-radius: 12px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .log-message {
            padding: 8px;
            margin-bottom: 6px;
            background: #1a202c;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            color: #e2e8f0;
        }
        .log-time {
            color: #a0aec0;
            font-size: 11px;
        }
        .info-box {
            background: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-box h4 {
            color: #2c5282;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .info-box p {
            color: #2d3748;
            font-size: 13px;
            line-height: 1.6;
        }
        .info-box code {
            background: #bee3f8;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            .state-grid {
                grid-template-columns: 1fr;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏏 IPL Auction Portal</h1>
            <p>Multi-Device WebSocket Test</p>
        </div>
        
        <div class="content">
            <div class="info-box">
                <h4>📱 Multi-Device Access</h4>
                <p>
                    Open this page on any device connected to your network:<br>
                    <code>http://192.168.0.103:8000/test_network.html</code>
                </p>
            </div>

            <div id="status" class="status-box status-disconnected">
                ⚠️ Disconnected
            </div>

            <div class="button-group">
                <button id="connectBtn" class="btn-connect" onclick="connect()">
                    🔌 Connect
                </button>
                <button id="disconnectBtn" class="btn-disconnect" onclick="disconnect()" disabled>
                    🔴 Disconnect
                </button>
                <button class="btn-test" onclick="testAPI()">
                    🧪 Test API
                </button>
            </div>

            <div class="auction-state">
                <h3>📊 Live Auction State</h3>
                <div class="state-grid">
                    <div class="state-item">
                        <div class="state-label">Status</div>
                        <div id="stateStatus" class="state-value">-</div>
                    </div>
                    <div class="state-item">
                        <div class="state-label">Current Bid</div>
                        <div id="stateBid" class="state-value highlight">₹0L</div>
                    </div>
                    <div class="state-item">
                        <div class="state-label">Player</div>
                        <div id="statePlayer" class="state-value">-</div>
                    </div>
                    <div class="state-item">
                        <div class="state-label">Team</div>
                        <div id="stateTeam" class="state-value">-</div>
                    </div>
                </div>
            </div>

            <h3 style="margin-bottom: 10px; color: #2d3748;">📨 Live Updates</h3>
            <div class="log-container" id="log">
                <div class="log-message">
                    <span class="log-time">Waiting for connection...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        const SERVER_IP = '192.168.0.103';
        const WS_URL = `ws://${SERVER_IP}:8000/ws/auction`;
        const API_URL = `http://${SERVER_IP}:8000`;

        function connect() {
            addLog('🔌 Connecting to ' + WS_URL);
            
            try {
                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    updateStatus(true, '✅ Connected to Network');
                    addLog('✅ Connected successfully!');
                    addLog('📡 Device: ' + navigator.userAgent.split(')')[0] + ')');
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        updateAuctionState(data);
                        
                        const status = data.status || 'IDLE';
                        const bid = data.currentBid || 0;
                        const player = data.currentPlayer ? data.currentPlayer.name : 'None';
                        
                        addLog(`📥 Update: ${status} | ${player} | ₹${bid}L`);
                    } catch (e) {
                        addLog('⚠️ Failed to parse message');
                    }
                };

                ws.onerror = (error) => {
                    addLog('❌ Connection error');
                    console.error('WebSocket error:', error);
                };

                ws.onclose = () => {
                    updateStatus(false, '⚠️ Disconnected');
                    addLog('🔌 Connection closed');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('disconnectBtn').disabled = true;
                };
            } catch (e) {
                addLog('❌ Error: ' + e.message);
                updateStatus(false, '❌ Connection Failed');
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                addLog('👋 Disconnected by user');
            }
        }

        async function testAPI() {
            addLog('🧪 Testing API endpoint...');
            try {
                const response = await fetch(`${API_URL}/auction/state`);
                const data = await response.json();
                addLog(`✅ API Test OK: Status=${data.status}, Bid=₹${data.currentBid}L`);
            } catch (e) {
                addLog('❌ API Test Failed: ' + e.message);
            }
        }

        function updateStatus(connected, text) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = text;
            statusEl.className = 'status-box ' + (connected ? 'status-connected' : 'status-disconnected');
        }

        function updateAuctionState(data) {
            document.getElementById('stateStatus').textContent = data.status || 'IDLE';
            document.getElementById('stateBid').textContent = '₹' + (data.currentBid || 0) + 'L';
            
            const player = data.currentPlayer;
            document.getElementById('statePlayer').textContent = player ? player.name : 'None';
            
            const team = data.winningTeam;
            document.getElementById('stateTeam').textContent = team ? team.name : 'None';
        }

        function addLog(message) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'log-message';
            msgDiv.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            logEl.appendChild(msgDiv);
            logEl.scrollTop = logEl.scrollHeight;
            
            // Keep only last 20 messages
            while (logEl.children.length > 20) {
                logEl.removeChild(logEl.firstChild);
            }
        }

        // Auto-connect on load
        window.addEventListener('load', () => {
            addLog('🌐 Page loaded on ' + navigator.platform);
            addLog('📱 Screen: ' + screen.width + 'x' + screen.height);
            setTimeout(connect, 500);
        });

        // Reconnect on visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && (!ws || ws.readyState !== WebSocket.OPEN)) {
                addLog('👁️ Page visible - reconnecting...');
                setTimeout(connect, 500);
            }
        });
    </script>
</body>
</html>
